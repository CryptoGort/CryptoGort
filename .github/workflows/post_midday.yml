name: Midday Post (12:00 PM ET)

on:
  schedule:
    - cron: "57 15 * * 1-5"  # ~12:00 PM ET (offset to avoid top-of-hour delays)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/automate-x-posts-3EXJn

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - run: python test_post.py midday --post
        env:
          X_API_KEY: ${{ secrets.XAPI }}
          X_API_SECRET: ${{ secrets.XAPISECRET }}
          X_ACCESS_TOKEN: ${{ secrets.XACCESSTOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.XTOKENSECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPICAPIKEY }}
